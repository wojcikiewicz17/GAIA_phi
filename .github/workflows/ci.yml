name: ci

on:
  push:
  pull_request:

jobs:
  host-build-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

      - name: Run CTest
        run: ctest --test-dir build --output-on-failure

      - name: Generate ASM manifest
        run: cmake --build build --target asm_manifest

      - name: Upload host artifacts
        uses: actions/upload-artifact@v4
        with:
          name: host-build-artifacts
          path: |
            build/structural_selftest
            build/smart_guard_cli
            build/asm/manifest.json

  android-ndk-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      - name: Configure Android build
        run: |
          cmake -S . -B build-android \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=21
      - name: Build Android static targets
        run: cmake --build build-android --parallel
      - name: Generate ASM manifest
        run: cmake --build build-android --target asm_manifest
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}-artifacts
          path: |
            build-android/libgaia_asm_core.a
            build-android/libgaia_core_v2.a
            build-android/libgaia_engines_v2.a
            build-android/libllama_guard.a
            build-android/asm/manifest.json
